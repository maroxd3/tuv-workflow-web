<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>tuv-workflow-web - Architecture Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #0F0F0F;
    --panel: #161616;
    --panel-2: #1c1c1c;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #8a8a8a;
    --client: #4ea1ff;
    --route: #7bd389;
    --service: #c792ea;
    --db: #ffb86b;
    --external: #ff6b9d;
    --critical: #ff3860;
    --accent: #f5b942;
    --accent-2: #ff7a45;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 13px; line-height: 1.45; }
  .app { display: grid; grid-template-rows: 56px 1fr; grid-template-columns: 1fr 380px; grid-template-areas: "topbar topbar" "canvas side"; height: 100vh; overflow: hidden; }
  .topbar { grid-area: topbar; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 10px; background: var(--panel); }
  .title { font-weight: 700; letter-spacing: -0.01em; font-size: 14px; margin-right: 8px; color: var(--text); }
  .title .sub { color: var(--muted); font-weight: 400; margin-left: 6px; font-size: 11px; }
  .chips { display: flex; gap: 6px; flex: 1; overflow-x: auto; padding-right: 8px; }
  .chip { background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 999px; cursor: pointer; font-size: 11px; white-space: nowrap; user-select: none; font-weight: 500; transition: all 0.15s; }
  .chip:hover { color: var(--text); border-color: #3a3a3a; }
  .chip.active { background: rgba(78,161,255,0.14); color: var(--client); border-color: rgba(78,161,255,0.45); }
  .chip.danger.active { background: rgba(255,56,96,0.14); color: var(--critical); border-color: rgba(255,56,96,0.45); }
  .canvas-wrap { grid-area: canvas; position: relative; overflow: hidden; background: radial-gradient(circle at 20% 10%, #1a1a1a 0%, #0F0F0F 60%); }
  svg.map { width: 100%; height: 100%; user-select: none; cursor: grab; }
  svg.map.dragging { cursor: grabbing; }
  .zoom-controls { position: absolute; bottom: 14px; left: 14px; display: flex; gap: 6px; z-index: 5; }
  .zoom-btn { background: var(--panel); border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: 7px; cursor: pointer; font-size: 14px; line-height: 1; font-weight: 600; transition: all 0.15s; }
  .zoom-btn:hover { background: var(--panel-2); border-color: #3a3a3a; }
  .legend { position: absolute; bottom: 14px; right: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 10px; color: var(--muted); display: flex; gap: 12px; align-items: center; z-index: 5; }
  .legend .li { display: flex; align-items: center; gap: 5px; }
  .legend .sw { width: 18px; height: 2px; border-radius: 1px; }
  .side { grid-area: side; border-left: 1px solid var(--border); overflow-y: auto; background: var(--panel); padding: 18px 18px 28px; }
  .side h1 { font-size: 13px; margin: 0 0 4px; font-weight: 700; letter-spacing: -0.01em; }
  .side h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin: 18px 0 8px; font-weight: 600; }
  .side .role { color: var(--muted); font-size: 12px; margin: 4px 0 10px; }
  .side .plain { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 12px; line-height: 1.55; margin-bottom: 12px; }
  .side .path { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; color: var(--accent); margin-bottom: 8px; word-break: break-all; }
  .side .notes { list-style: none; padding: 0; margin: 0; }
  .side .notes li { font-size: 11.5px; padding: 4px 0; border-bottom: 1px dashed var(--border); color: #c8c8c8; }
  .side .notes li:last-child { border-bottom: none; }
  .side .edge-list { list-style: none; padding: 0; margin: 0; font-size: 11.5px; }
  .side .edge-list li { padding: 4px 0; color: #c8c8c8; }
  .side .edge-list .arrow { color: var(--muted); margin: 0 5px; }
  .side .edge-list .lbl { color: var(--accent); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10.5px; margin-left: 4px; }
  .side .finding { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 12px; margin-bottom: 8px; line-height: 1.5; }
  .side .finding strong { color: var(--accent); }
  .side .finding.warn strong { color: var(--critical); }
  .side .empty { color: var(--muted); font-size: 12px; padding: 8px 0; }
  .side .bug { background: rgba(255,56,96,0.08); border: 1px solid rgba(255,56,96,0.28); border-radius: 6px; padding: 6px 9px; margin-bottom: 6px; font-size: 11.5px; }
  .side .bug .sev { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 6px; }
  .side .bug .sev.high { background: var(--critical); color: #fff; }
  .side .bug .sev.med { background: var(--accent); color: #1a1a1a; }
  .side .bug .sev.low { background: var(--muted); color: #1a1a1a; }
  .side .fix { background: rgba(123,211,137,0.08); border: 1px solid rgba(123,211,137,0.28); border-radius: 6px; padding: 6px 9px; margin-bottom: 6px; font-size: 11.5px; }
  .side .fix .n { display: inline-block; width: 18px; height: 18px; line-height: 18px; text-align: center; background: var(--route); color: #1a1a1a; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; font-weight: 700; border-radius: 9px; margin-right: 6px; }
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; pointer-events: none; }
  .node-bg { transition: opacity 0.15s; cursor: pointer; }
  .node-bg:hover .node-shadow { filter: drop-shadow(0 4px 14px rgba(0,0,0,0.55)); }
  .node-bg.dim { opacity: 0.18; }
  .edge { transition: opacity 0.15s; }
  .edge.dim { opacity: 0.07; }
  .edge-label { font-size: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .cluster-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
  .badge-fix circle { fill: var(--route); }
  .badge-fix text { fill: #1a1a1a; font-size: 10px; font-weight: 700; }
  .badge-bug circle { fill: var(--critical); }
  .badge-bug text { fill: #fff; font-size: 10px; font-weight: 700; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
</style>
</head>

    { sev: 'med', t: 'Lines 4-11 read VITE_FIREBASE_* env vars with no presence check. If .env is missing, initializeApp() still succeeds but every onSnapshot/setDoc fails silently — and writeFzDoc/writeTrDoc use .catch(() => {}) so errors are swallowed.' },
  ],
  'useStore':     [
    { sev: 'low', t: 'queueMicrotask in the seed effect (lines 167-170) defers setState to satisfy the react-hooks/set-state-in-effect lint rule; if seeding takes long the UI briefly shows empty state.' },
  ],
};

/* ════════════════════════════════════════════════════════════════════
   RENDERING
   ════════════════════════════════════════════════════════════════════ */

const COLOR_MAP = {
  client:   '#4ea1ff',
  route:    '#7bd389',
  service:  '#c792ea',
  db:       '#ffb86b',
  external: '#ff6b9d',
};
const EDGE_COLOR = {
  critical: '#ff3860',
  api:      '#ff7a45',
  db:       '#ffb86b',
  mount:    '#4ea1ff',
  normal:   '#8a8a8a',
};

const nodeById = Object.fromEntries(nodes.map(n => [n.id, n]));

function tint(hex, alpha) {
  const m = hex.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
  if (!m) return hex;
  const r = parseInt(m[1], 16), g = parseInt(m[2], 16), b = parseInt(m[3], 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

const clusterColorById = (id) => {
  if (id === 'entry') return COLOR_MAP.client;
  if (id === 'layout') return COLOR_MAP.client;
  if (id === 'views') return COLOR_MAP.route;
  if (id === 'modals') return COLOR_MAP.service;
  if (id === 'state') return COLOR_MAP.service;
  if (id === 'ui') return COLOR_MAP.service;
  if (id === 'external') return COLOR_MAP.external;
  return '#888';
};

/* ── Build chips ── */
const chipsRoot = document.getElementById('chips');
const FILTERS = [
  { id: 'overview',   label: 'Overview',           default: true },
  { id: 'tagesplan',  label: 'Tagesplan' },
  { id: 'fahrzeuge',  label: 'Fahrzeuge' },
  { id: 'maengel',    label: 'Mängel' },
  { id: 'termine',    label: 'Termine' },
  { id: 'statistik',  label: 'Statistik' },
  { id: 'berichte',   label: 'Berichte' },
  { id: 'navigation', label: 'Navigation' },
  { id: 'demo-mode',  label: 'Demo mode' },
  { id: 'data',       label: 'Critical path', critical: true },
  { id: 'all',        label: 'Show all wires' },
  { id: 'fixes-bugs', label: 'Roadmap & bugs', danger: true },
];
let activeFilter = 'overview';
FILTERS.forEach(f => {
  const b = document.createElement('button');
  b.className = 'chip' + (f.default ? ' active' : '') + (f.danger ? ' danger' : '');
  b.textContent = f.label;
  b.dataset.id = f.id;
  b.addEventListener('click', () => {
    activeFilter = f.id;
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.id === f.id));
    applyFilter();
  });
  chipsRoot.appendChild(b);
});

/* ── Render clusters ── */
const clustersGroup = document.getElementById('clusters');
clusters.forEach(c => {
  const col = clusterColorById(c.id);
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', c.x);
  rect.setAttribute('y', c.y);
  rect.setAttribute('width', c.w);
  rect.setAttribute('height', c.h);
  rect.setAttribute('rx', 14);
  rect.setAttribute('fill', tint(col, 0.04));
  rect.setAttribute('stroke', tint(col, 0.22));
  rect.setAttribute('stroke-width', 1);
  rect.setAttribute('stroke-dasharray', '4 4');
  g.appendChild(rect);
  const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  t.setAttribute('x', c.x + 14);
  t.setAttribute('y', c.y + 26);
  t.setAttribute('class', 'cluster-label');
  t.setAttribute('fill', tint(col, 0.75));
  t.textContent = c.label;
  g.appendChild(t);
  clustersGroup.appendChild(g);
});

/* ── Render edges ── */
const edgesGroup = document.getElementById('edges');
function edgePath(a, b) {
  /* Use right-edge of a → left-edge of b, with bezier through gutter */
  let x1 = a.x + a.w, y1 = a.y + a.h / 2;
  let x2 = b.x,       y2 = b.y + b.h / 2;
  if (b.x < a.x) {
    /* edge goes right→left: route around via vertical drop, fall back to centre-to-centre */
    x1 = a.x; y1 = a.y + a.h / 2;
    x2 = b.x + b.w; y2 = b.y + b.h / 2;
  }
  const dx = Math.max(40, Math.abs(x2 - x1) * 0.5);
  const cx1 = x1 + (x2 > x1 ? dx : -dx);
  const cx2 = x2 + (x2 > x1 ? -dx : dx);
  return `M ${x1} ${y1} C ${cx1} ${y1}, ${cx2} ${y2}, ${x2} ${y2}`;
}
edges.forEach((e, i) => {
  const a = nodeById[e.from], b = nodeById[e.to];
  if (!a || !b) return;
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('class', 'edge');
  g.dataset.edgeIdx = i;
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', edgePath(a, b));
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', EDGE_COLOR[e.kind] || '#8a8a8a');
  path.setAttribute('stroke-width', e.kind === 'critical' ? 1.8 : 1.1);
  path.setAttribute('stroke-opacity', e.kind === 'critical' ? 0.95 : 0.55);
  path.setAttribute('marker-end', `url(#arrow-${e.kind})`);
  if (e.kind === 'mount') path.setAttribute('stroke-dasharray', '4 3');
  g.appendChild(path);

  /* Compute midpoint for the label */
  const tt = 0.5;
  const x1 = a.x + a.w, y1 = a.y + a.h / 2;
  const x2 = b.x,       y2 = b.y + b.h / 2;
  const mx = (x1 + x2) / 2;
  /* Offset stagger to reduce label collisions */
  const my = (y1 + y2) / 2 + ((i % 4) - 1.5) * 4;

  if (e.label) {
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lbl.setAttribute('x', mx);
    lbl.setAttribute('y', my);
    lbl.setAttribute('class', 'edge-label');
    lbl.setAttribute('text-anchor', 'middle');
    lbl.setAttribute('fill', EDGE_COLOR[e.kind] || '#aaa');
    lbl.setAttribute('opacity', e.kind === 'critical' ? 0.92 : 0.7);
    lbl.textContent = e.label;
    /* Measure after insertion */
    g.appendChild(bg);
    g.appendChild(lbl);
    edgesGroup.appendChild(g);
    const bbox = lbl.getBBox();
    bg.setAttribute('x', bbox.x - 4);
    bg.setAttribute('y', bbox.y - 1.5);
    bg.setAttribute('width', bbox.width + 8);
    bg.setAttribute('height', bbox.height + 3);
    bg.setAttribute('fill', '#0F0F0F');
    bg.setAttribute('rx', 3);
  } else {
    edgesGroup.appendChild(g);
  }
});

/* ── Render nodes ── */
const nodesGroup = document.getElementById('nodes');
nodes.forEach(n => {
  const col = COLOR_MAP[n.color] || '#888';
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('class', 'node-bg');
  g.dataset.id = n.id;

  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', n.x);
  rect.setAttribute('y', n.y);
  rect.setAttribute('width', n.w);
  rect.setAttribute('height', n.h);
  rect.setAttribute('rx', 8);
  rect.setAttribute('fill', tint(col, 0.10));
  rect.setAttribute('stroke', col);
  rect.setAttribute('stroke-width', n.critical ? 2.2 : 1.2);
  rect.setAttribute('class', 'node-shadow');
  g.appendChild(rect);

  /* Label */
  const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  lbl.setAttribute('x', n.x + 12);
  lbl.setAttribute('y', n.y + 22);
  lbl.setAttribute('fill', '#f5f5f5');
  lbl.setAttribute('font-weight', '700');
  lbl.setAttribute('font-size', '13');
  lbl.textContent = n.label;
  g.appendChild(lbl);

  if (n.sub) {
    const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    sub.setAttribute('x', n.x + 12);
    sub.setAttribute('y', n.y + 40);
    sub.setAttribute('fill', tint(col, 0.85));
    sub.setAttribute('font-size', '10.5');
    sub.setAttribute('font-family', 'ui-monospace, SFMono-Regular, Menlo, monospace');
    sub.textContent = n.sub;
    g.appendChild(sub);
  }

  /* Tiny path footer */
  if (n.path) {
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    p.setAttribute('x', n.x + 12);
    p.setAttribute('y', n.y + n.h - 8);
    p.setAttribute('fill', '#777');
    p.setAttribute('font-size', '9');
    p.setAttribute('font-family', 'ui-monospace, SFMono-Regular, Menlo, monospace');
    p.textContent = n.path.replace(/^src\//, '');
    g.appendChild(p);
  }

  /* Badges (top-right) */
  const fixCount = FIXES[n.id]?.length || 0;
  const bugCount = KNOWN_BUGS[n.id]?.length || 0;
  let bx = n.x + n.w - 14;
  if (bugCount > 0) {
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    bg.setAttribute('class', 'badge-bug');
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', bx); c.setAttribute('cy', n.y + 12); c.setAttribute('r', 8);
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', bx); t.setAttribute('y', n.y + 16); t.setAttribute('text-anchor', 'middle');
    t.textContent = bugCount;
    bg.appendChild(c); bg.appendChild(t);
    g.appendChild(bg);
    bx -= 20;
  }
  if (fixCount > 0) {
    const fg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    fg.setAttribute('class', 'badge-fix');
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', bx); c.setAttribute('cy', n.y + 12); c.setAttribute('r', 8);
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', bx); t.setAttribute('y', n.y + 16); t.setAttribute('text-anchor', 'middle');
    t.textContent = fixCount;
    fg.appendChild(c); fg.appendChild(t);
    g.appendChild(fg);
  }

  g.addEventListener('mouseenter', () => { if (!selectedId) showNode(n.id); highlight(n.id); });
  g.addEventListener('mouseleave', () => { if (!selectedId) { unhighlight(); showDefault(); } else { highlight(selectedId); } });
  g.addEventListener('click', (e) => { e.stopPropagation(); selectedId = n.id; showNode(n.id); highlight(n.id); });
  nodesGroup.appendChild(g);
});

/* ── Sidebar render ── */
const sideEl = document.getElementById('side');
let selectedId = null;

function showDefault() {
  sideEl.innerHTML = `
    <h1>Architecture map</h1>
    <div class="role">React 19 + Vite single-page app. Firestore on the right edge is the only persistence layer.</div>
    <h2>How to read this</h2>
    <div class="finding">
      Red lines are the spine — the path data takes from app launch to a saved Termin. Click any node to pin it; hover any node to peek. Use the chips at the top to dim everything outside one feature.
    </div>
    <h2>Notable findings from this map</h2>
    <div class="finding warn"><strong>Dead code · src/components/Toast.jsx</strong><br>Defines Toast + ToastStack but nothing in the app imports either. Toast notifications are produced via Sonner (App.jsx:67) through useToasts. The file can be deleted.</div>
    <div class="finding warn"><strong>Silent Firebase failures · src/firebase.js:4-11</strong><br>VITE_FIREBASE_* env vars are read with no presence check. If .env is missing in production, initializeApp() still returns a handle, every Firestore call fails — and useStore swallows errors with <code>.catch(() => {})</code>. The 3-second fallback timer at useStore.js:122 then loads the demo seed, masking the misconfig.</div>
    <div class="finding"><strong>Vestigial useToasts API · src/hooks/useToasts.js:11-12</strong><br><code>toasts: []</code> and <code>rm: () => {}</code> are leftovers from a prior custom toast implementation. No caller reads them — they could be dropped.</div>
    <div class="finding"><strong>Unexpectedly heavy: StatistikView</strong><br>Charts on the Statistik page pull in recharts (~110 kB gzipped, the largest single chunk in the build). The view is lazy-loaded in App.jsx:12, so this only hits when a user actually opens the page.</div>
    <div class="finding"><strong>Single store, no Redux/Zustand</strong><br>useStore.js (309 lines) does it all: Firestore subscription, localStorage cache, seeding, CRUD, demo-mode toggling. Replacing it touches every view because data flows top-down from App.jsx:36.</div>
    <h2>Filters</h2>
    <div class="finding">Click a chip to dim everything outside that feature. "Roadmap & bugs" highlights only nodes with green/red badges.</div>
  `;
}

function showNode(id) {
  const n = nodeById[id];
  if (!n) return;
  const incoming = edges.filter(e => e.to === id);
  const outgoing = edges.filter(e => e.from === id);
  const fixes = FIXES[id] || [];
  const bugs  = KNOWN_BUGS[id] || [];
  sideEl.innerHTML = `
    <h1>${escapeHtml(n.label)}${n.critical ? ' <span style="color:#ff3860; font-size:10px; vertical-align:middle; margin-left:6px;">CRITICAL</span>' : ''}</h1>
    <div class="role">${escapeHtml(n.role || '')}</div>
    <div class="path">${escapeHtml(n.path || '')}</div>
    <div class="plain">${escapeHtml(n.plain || '')}</div>
    ${n.notes?.length ? `<h2>Notes</h2><ul class="notes">${n.notes.map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul>` : ''}
    ${bugs.length ? `<h2>Known bugs</h2>${bugs.map(b => `<div class="bug"><span class="sev ${b.sev}">${b.sev.toUpperCase()}</span>${escapeHtml(b.t)}</div>`).join('')}` : ''}
    ${fixes.length ? `<h2>Fixes / roadmap</h2>${fixes.map(f => `<div class="fix"><span class="n">${f.n}</span>${escapeHtml(f.t)}</div>`).join('')}` : ''}
    <h2>Incoming (${incoming.length})</h2>
    ${incoming.length ? `<ul class="edge-list">${incoming.map(e => `<li>${escapeHtml(nodeById[e.from]?.label || e.from)}<span class="arrow">→</span>${escapeHtml(n.label)}${e.label ? `<span class="lbl">${escapeHtml(e.label)}</span>` : ''}</li>`).join('')}</ul>` : `<div class="empty">No callers in graph.</div>`}
    <h2>Outgoing (${outgoing.length})</h2>
    ${outgoing.length ? `<ul class="edge-list">${outgoing.map(e => `<li>${escapeHtml(n.label)}<span class="arrow">→</span>${escapeHtml(nodeById[e.to]?.label || e.to)}${e.label ? `<span class="lbl">${escapeHtml(e.label)}</span>` : ''}</li>`).join('')}</ul>` : `<div class="empty">Leaf node.</div>`}
  `;
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ── Highlight / dim logic ── */
function highlight(id) {
  const connected = new Set([id]);
  edges.forEach(e => {
    if (e.from === id) connected.add(e.to);
    if (e.to === id) connected.add(e.from);
  });
  document.querySelectorAll('.node-bg').forEach(el => {
    el.classList.toggle('dim', !connected.has(el.dataset.id));
  });
  document.querySelectorAll('.edge').forEach(el => {
    const e = edges[+el.dataset.edgeIdx];
    el.classList.toggle('dim', !(e.from === id || e.to === id));
  });
}
function unhighlight() {
  document.querySelectorAll('.node-bg').forEach(el => el.classList.remove('dim'));
  document.querySelectorAll('.edge').forEach(el => el.classList.remove('dim'));
}

/* ── Filter logic ── */
function applyFilter() {
  if (activeFilter === 'fixes-bugs') {
    const hot = new Set([...Object.keys(FIXES), ...Object.keys(KNOWN_BUGS)]);
    document.querySelectorAll('.node-bg').forEach(el => el.classList.toggle('dim', !hot.has(el.dataset.id)));
    document.querySelectorAll('.edge').forEach(el => {
      const e = edges[+el.dataset.edgeIdx];
      el.classList.toggle('dim', !(hot.has(e.from) && hot.has(e.to)));
    });
  } else if (activeFilter === 'data') {
    /* "Critical path" — show only nodes/edges on the spine */
    document.querySelectorAll('.node-bg').forEach(el => {
      const n = nodeById[el.dataset.id];
      el.classList.toggle('dim', !n.critical);
    });
    document.querySelectorAll('.edge').forEach(el => {
      const e = edges[+el.dataset.edgeIdx];
      el.classList.toggle('dim', e.kind !== 'critical');
    });
  } else {
    document.querySelectorAll('.node-bg').forEach(el => {
      const n = nodeById[el.dataset.id];
      el.classList.toggle('dim', !(n.tag || []).includes(activeFilter));
    });
    document.querySelectorAll('.edge').forEach(el => {
      const e = edges[+el.dataset.edgeIdx];
      el.classList.toggle('dim', !(e.tag || []).includes(activeFilter));
    });
  }
  selectedId = null;
  showDefault();
}

/* ── Pan + zoom ── */
const svg = document.getElementById('map');
const vp = document.getElementById('viewport');
let tx = 0, ty = 0, scale = 1;
function apply() { vp.setAttribute('transform', `translate(${tx} ${ty}) scale(${scale})`); }
function fit() {
  /* Fit the natural viewBox 0 0 2200 1380; reset transform. */
  tx = 0; ty = 0; scale = 1;
  apply();
}
fit();

svg.addEventListener('wheel', (e) => {
  e.preventDefault();
  const pt = svg.createSVGPoint();
  pt.x = e.clientX; pt.y = e.clientY;
  const ctm = svg.getScreenCTM().inverse();
  const cursor = pt.matrixTransform(ctm);
  const dir = e.deltaY > 0 ? -1 : 1;
  const factor = 1 + dir * 0.12;
  const nextScale = Math.max(0.25, Math.min(3, scale * factor));
  const ratio = nextScale / scale;
  tx = cursor.x - (cursor.x - tx) * ratio;
  ty = cursor.y - (cursor.y - ty) * ratio;
  scale = nextScale;
  apply();
}, { passive: false });

let dragging = false, dragSX = 0, dragSY = 0, dragTX = 0, dragTY = 0;
svg.addEventListener('mousedown', (e) => {
  if (e.target.closest('.node-bg')) return;
  dragging = true; svg.classList.add('dragging');
  dragSX = e.clientX; dragSY = e.clientY; dragTX = tx; dragTY = ty;
});
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  tx = dragTX + (e.clientX - dragSX);
  ty = dragTY + (e.clientY - dragSY);
  apply();
});
window.addEventListener('mouseup', () => {
  if (dragging) { dragging = false; svg.classList.remove('dragging'); }
});

document.getElementById('z-fit').addEventListener('click', fit);
document.getElementById('z-in').addEventListener('click', () => { scale = Math.min(3, scale * 1.2); apply(); });
document.getElementById('z-out').addEventListener('click', () => { scale = Math.max(0.25, scale / 1.2); apply(); });

svg.addEventListener('click', (e) => {
  if (e.target.closest('.node-bg')) return;
  selectedId = null;
  unhighlight();
  if (activeFilter !== 'overview') applyFilter();
  showDefault();
});

/* ── First paint ── */
applyFilter();
showDefault();
</script>
