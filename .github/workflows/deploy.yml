name: Deploy to Firebase Hosting

# Auto-Deploy ist erst aktiv sobald der GitHub-Secret
# FIREBASE_SERVICE_ACCOUNT_TUV_PRUFSTELLE_PRO gesetzt ist.
# Bis dahin nur manueller Trigger (Actions-Tab → Run workflow).
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, test
        run: |
          npm run lint
          npm run typecheck
          npm test

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TUV_PRUFSTELLE_PRO }}
          projectId: tuv-prufstelle-pro
          target: tuv-workflow
          channelId: live
